<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペイトナーUPLOADファイル作成</title>
<style>
  :root {
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-link: #0066cc;
    --bg: #fff;
    --section-bg: #f5f5f7;
    --apple-blue: #0071e3;
    --border: #d2d2d7;
    --error: #ff3b30;
    --error-bg: #fff2f2;
    --warn: #ff9500;
    --warn-bg: #fff8f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: "SF Pro JP", "SF Pro Text", "SF Pro Icons",
      "Hiragino Kaku Gothic Pro", "ヒラギノ角ゴ Pro W3",
      メイリオ, Meiryo, "ＭＳ Ｐゴシック",
      "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 17px;
    line-height: 1.47;
    letter-spacing: -0.357px;
    min-height: 100vh;
  }

  .page-wrap {
    max-width: 1260px;
    margin: 0 auto;
    padding: 0 22px;
  }

  /* ヘッダ */
  .page-header {
    padding: 64px 0 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }
  .page-header h1 {
    font-family: "SF Pro JP", "SF Pro Display", "SF Pro Icons",
      "Hiragino Kaku Gothic Pro", "ヒラギノ角ゴ Pro W3",
      メイリオ, Meiryo, "ＭＳ Ｐゴシック",
      "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: 40px;
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: normal;
    color: var(--text-primary);
  }

  .content { max-width: 600px; }

  .section { margin-bottom: 32px; }
  .section-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 10px;
    letter-spacing: normal;
  }

  /* 日付入力 */
  input[type="date"] {
    width: 100%;
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 17px;
    color: var(--text-primary);
    font-size: 17px;
    font-family: inherit;
    letter-spacing: -0.357px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="date"]:focus {
    border-color: var(--apple-blue);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.2);
  }

  /* ファイルドロップ */
  .file-drop {
    background: var(--section-bg);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .file-drop:hover, .file-drop.drag-over {
    border-color: var(--apple-blue);
    background: rgba(0,113,227,0.04);
  }
  .file-drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .file-drop-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.35; }
  .file-drop-text { font-size: 15px; color: var(--text-secondary); line-height: 1.5; }
  .file-drop-text em {
    color: var(--text-link);
    font-style: normal;
    text-decoration: underline;
    text-decoration-color: rgba(0,102,204,0.3);
  }

  /* ファイルリスト */
  .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .file-item-name {
    font-size: 14px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    letter-spacing: normal;
  }
  .file-item-remove {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0 0 0 12px;
    flex-shrink: 0;
    transition: color 0.15s;
  }
  .file-item-remove:hover { color: var(--error); }

  /* 実行ボタン */
  .btn-run {
    display: inline-block;
    background: var(--apple-blue);
    color: #fff;
    border: none;
    border-radius: 980px;
    padding: 13px 32px;
    font-size: 17px;
    font-weight: 400;
    font-family: inherit;
    letter-spacing: -0.357px;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 8px;
  }
  .btn-run:hover:not(:disabled) { background: #0077ed; }
  .btn-run:disabled { background: #c7c7cc; cursor: not-allowed; }

  /* ステータス */
  #status-area { display: none; margin-top: 40px; }

  .processing-box {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 0;
  }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--apple-blue);
    border-radius: 50%;
    flex-shrink: 0;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-text { font-size: 17px; color: var(--text-secondary); }

  /* 通知ボックス */
  .notice-box {
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    font-size: 14px;
    line-height: 1.5;
  }
  .notice-box-title {
    font-weight: 600;
    margin-bottom: 10px;
    font-size: 14px;
    letter-spacing: normal;
  }
  .notice-box ul { list-style: none; display: flex; flex-direction: column; gap: 0; }
  .notice-box ul li {
    font-size: 13px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    letter-spacing: normal;
  }
  .notice-box ul li:last-child { border-bottom: none; }

  .notice-warn { background: var(--warn-bg); border: 1px solid rgba(255,149,0,0.25); color: #7a4a00; }
  .notice-warn .notice-box-title { color: var(--warn); }
  .notice-error { background: var(--error-bg); border: 1px solid rgba(255,59,48,0.2); color: #8b0000; }
  .notice-error .notice-box-title { color: var(--error); }

  /* 完了ボックス */
  .result-box {
    background: var(--section-bg);
    border-radius: 18px;
    padding: 32px;
  }
  .result-title {
    font-family: "SF Pro JP", "SF Pro Display", "SF Pro Icons",
      "Hiragino Kaku Gothic Pro", "ヒラギノ角ゴ Pro W3",
      メイリオ, Meiryo, sans-serif;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.196px;
    color: var(--text-primary);
    margin-bottom: 28px;
  }
  .result-row { margin-bottom: 20px; }
  .result-row-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 6px;
    letter-spacing: normal;
  }
  .result-filename {
    font-size: 14px;
    color: var(--text-primary);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    margin-bottom: 4px;
    letter-spacing: normal;
  }
  .result-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 17px;
    color: var(--text-link);
    text-decoration: none;
    letter-spacing: -0.357px;
  }
  .result-link:hover { text-decoration: underline; }
  .result-count {
    font-size: 21px;
    font-weight: 400;
    color: var(--text-primary);
    letter-spacing: 0.231px;
  }

  /* 致命的エラー */
  .fatal-box {
    background: var(--error-bg);
    border: 1px solid rgba(255,59,48,0.2);
    border-radius: 12px;
    padding: 24px;
  }
  .fatal-title { font-size: 17px; font-weight: 600; color: var(--error); margin-bottom: 8px; }
  .fatal-message { font-size: 14px; color: #8b0000; line-height: 1.6; letter-spacing: normal; }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="page-header">
    <h1>ペイトナーUPLOADファイル作成</h1>
  </header>

  <div class="content">

    <div class="section">
      <div class="section-label">振込予定日</div>
      <input type="date" id="transfer-date">
    </div>

    <div class="section">
      <div class="section-label">入力明細ファイル</div>
      <div class="file-drop" id="file-drop">
        <input type="file" id="file-input" accept=".csv" multiple>
        <div class="file-drop-icon">📂</div>
        <div class="file-drop-text">
          CSVファイルをドロップ、または<em>クリックして選択</em><br>
          複数ファイル選択可
        </div>
      </div>
      <div class="file-list" id="file-list"></div>
    </div>

    <button class="btn-run" id="btn-run" onclick="runProcess()">出力ファイル作成</button>

    <div id="status-area">

      <div id="processing-view" class="processing-box" style="display:none;">
        <div class="spinner"></div>
        <div class="processing-text">処理中…</div>
      </div>

      <div id="result-view" style="display:none;">
        <div id="zero-amounts"></div>
        <div id="skip-errors"></div>
        <div class="result-box">
          <div class="result-title">処理完了</div>
          <div class="result-row">
            <div class="result-row-label">入力ファイル</div>
            <div id="result-input-files"></div>
          </div>
          <div class="result-row">
            <div class="result-row-label">出力ファイル</div>
            <a id="result-output-link" class="result-link" href="#" target="_blank">
              <span id="result-output-name"></span><span style="font-size:13px;">↗</span>
            </a>
          </div>
          <div class="result-row">
            <div class="result-row-label">出力レコード数</div>
            <div class="result-count" id="result-count"></div>
          </div>
        </div>
      </div>

      <div id="fatal-view" class="fatal-box" style="display:none;">
        <div class="fatal-title">エラーが発生しました</div>
        <div class="fatal-message" id="fatal-message"></div>
      </div>

    </div>
  </div>
</div>

<script>
let selectedFiles = [];
const fileInput = document.getElementById('file-input');
const fileList  = document.getElementById('file-list');
const fileDrop  = document.getElementById('file-drop');

fileInput.addEventListener('change', function() { addFiles(Array.from(this.files)); this.value = ''; });
fileDrop.addEventListener('dragover',  e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault(); fileDrop.classList.remove('drag-over');
  addFiles(Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.csv')));
});

function addFiles(files) {
  files.forEach(f => { if (!selectedFiles.find(s => s.name === f.name)) selectedFiles.push(f); });
  renderFileList();
}
function removeFile(idx) { selectedFiles.splice(idx, 1); renderFileList(); }
function renderFileList() {
  fileList.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `<div class="file-item-name">${f.name}</div>
      <button class="file-item-remove" onclick="removeFile(${i})">×</button>`;
    fileList.appendChild(item);
  });
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbx4Y--mhlesj6-W4ch81AjNiDnmR9Zk38RzUE7d-hDHW2X8CYlg5XcnFBwl7Erk83My/exec';

async function runProcess() {
  const dateVal = document.getElementById('transfer-date').value;
  if (!dateVal) { alert('振込予定日を入力してください'); return; }
  if (selectedFiles.length === 0) { alert('入力明細CSVを選択してください'); return; }
  showStatus('processing');
  document.getElementById('btn-run').disabled = true;
  try {
    const csvFiles = await Promise.all(
      selectedFiles.map(f => readFileAsText(f).then(content => ({ filename: f.name, content })))
    );
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'payload=' + encodeURIComponent(JSON.stringify({ action: 'createPayrollFile', transferDate: dateVal, csvFiles }))
    });
    const data = await res.json();
    data.status === 'ok' ? showResult(data) : showFatal(data.message || '不明なエラー');
  } catch (err) {
    showFatal('通信エラー: ' + err.message);
  } finally {
    document.getElementById('btn-run').disabled = false;
  }
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => resolve(e.target.result);
    r.onerror = () => reject(new Error('ファイル読み込み失敗: ' + file.name));
    r.readAsText(file, 'UTF-8');
  });
}

function showStatus(view) {
  document.getElementById('status-area').style.display      = 'block';
  document.getElementById('processing-view').style.display  = view === 'processing' ? 'flex'  : 'none';
  document.getElementById('result-view').style.display      = view === 'result'     ? 'block' : 'none';
  document.getElementById('fatal-view').style.display       = view === 'fatal'      ? 'block' : 'none';
}

function showResult(data) {
  const zeroEl = document.getElementById('zero-amounts');
  zeroEl.innerHTML = '';
  if (data.zeroAmounts && data.zeroAmounts.length > 0)
    zeroEl.appendChild(makeNoticeBox('warn', '総振込額0円 — 以下のレコードはスキップされました', data.zeroAmounts));

  const errEl = document.getElementById('skip-errors');
  errEl.innerHTML = '';
  if (data.errors && data.errors.length > 0)
    errEl.appendChild(makeNoticeBox('error', 'マスタ未ヒット — 以下のレコードはスキップされました', data.errors));

  const inputEl = document.getElementById('result-input-files');
  inputEl.innerHTML = '';
  (data.inputFileNames || []).forEach(name => {
    const d = document.createElement('div');
    d.className = 'result-filename';
    d.textContent = name;
    inputEl.appendChild(d);
  });

  document.getElementById('result-output-name').textContent = data.outputFileName;
  document.getElementById('result-output-link').href        = data.outputFileUrl;
  document.getElementById('result-count').textContent       = data.recordCount + ' 件';
  showStatus('result');
}

function makeNoticeBox(type, title, items) {
  const box = document.createElement('div');
  box.className = `notice-box notice-${type}`;
  const t = document.createElement('div');
  t.className = 'notice-box-title';
  t.textContent = '⚠ ' + title;
  box.appendChild(t);
  const ul = document.createElement('ul');
  items.forEach(e => {
    const li = document.createElement('li');
    li.textContent = `${e.filename}  ／  ${e.employeeName}`;
    ul.appendChild(li);
  });
  box.appendChild(ul);
  return box;
}

function showFatal(msg) {
  document.getElementById('fatal-message').textContent = msg;
  showStatus('fatal');
}
</script>
</body>
</html>
