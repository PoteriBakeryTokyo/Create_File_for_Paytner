<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与振込ファイル作成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #232323;
    --border: #2e2e2e;
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --accent-border: rgba(74,222,128,0.3);
    --text: #e8e8e8;
    --text-muted: #666;
    --text-sub: #999;
    --error: #f87171;
    --error-bg: rgba(248,113,113,0.08);
    --warn: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px;
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  /* ヘッダ */
  .header {
    margin-bottom: 48px;
  }
  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.3;
    color: var(--text);
  }

  /* カード */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    margin-bottom: 20px;
  }

  .card-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* 日付入力 */
  .field-label {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }

  input[type="date"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
    color-scheme: dark;
  }
  input[type="date"]:focus {
    border-color: var(--accent-border);
  }

  /* ファイルアップロード */
  .file-drop {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .file-drop:hover, .file-drop.drag-over {
    border-color: var(--accent-border);
    background: var(--accent-dim);
  }
  .file-drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .file-drop-icon {
    font-size: 28px;
    margin-bottom: 10px;
    opacity: 0.4;
  }
  .file-drop-text {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
  }
  .file-drop-text em {
    color: var(--accent);
    font-style: normal;
  }

  /* ファイルリスト */
  .file-list {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
  }
  .file-item-name {
    font-family: 'DM Mono', monospace;
    color: var(--text-sub);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .file-item-remove {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 0 0 12px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .file-item-remove:hover { color: var(--error); }

  /* 実行ボタン */
  .btn-run {
    width: 100%;
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn-run:hover:not(:disabled) { opacity: 0.88; }
  .btn-run:active:not(:disabled) { transform: scale(0.99); }
  .btn-run:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ステータス表示 */
  #status-area { display: none; }

  .processing-box {
    border: 1px solid var(--accent-border);
    background: var(--accent-dim);
    border-radius: 10px;
    padding: 28px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--accent-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .processing-text {
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  /* 完了ボックス */
  .result-box {
    border: 1px solid var(--accent-border);
    background: var(--surface);
    border-radius: 10px;
    padding: 28px;
  }
  .result-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-title::before {
    content: '✓';
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    background: var(--accent);
    color: #0f0f0f;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .result-section {
    margin-bottom: 16px;
  }
  .result-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .result-files {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .result-file {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-sub);
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 5px;
  }
  .result-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    padding: 8px 12px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 6px;
    transition: opacity 0.2s;
    word-break: break-all;
  }
  .result-link:hover { opacity: 0.75; }

  /* エラー表示 */
  .error-box {
    border: 1px solid rgba(248,113,113,0.3);
    background: var(--error-bg);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .error-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--error);
    letter-spacing: 0.08em;
    margin-bottom: 12px;
  }
  .error-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .error-list li {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--error);
    opacity: 0.8;
    padding: 4px 0;
    border-bottom: 1px solid rgba(248,113,113,0.1);
  }
  .error-list li:last-child { border-bottom: none; }

  /* 致命的エラー */
  .fatal-box {
    border: 1px solid rgba(248,113,113,0.4);
    background: var(--error-bg);
    border-radius: 10px;
    padding: 24px;
  }
  .fatal-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--error);
    margin-bottom: 8px;
  }
  .fatal-message {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--error);
    opacity: 0.8;
    line-height: 1.6;
  }

  /* GAS URL設定 */
  .gas-url-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .gas-url-section .card-title {
    margin-bottom: 12px;
  }
  .gas-input-row {
    display: flex;
    gap: 8px;
  }
  input[type="text"].gas-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"].gas-input:focus {
    border-color: var(--accent-border);
    color: var(--text);
  }
  .btn-save {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text-sub);
    font-size: 12px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
  }
  .btn-save:hover {
    border-color: var(--accent-border);
    color: var(--text);
  }
  .saved-note {
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
    display: none;
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">POTERI — Payroll</div>
    <h1>給与振込<br>ファイル作成</h1>
  </div>

  <!-- 入力カード -->
  <div class="card">
    <div class="card-title">01 / 振込予定日</div>
    <div class="field-label">振込予定日を選択してください</div>
    <input type="date" id="transfer-date">
  </div>

  <div class="card">
    <div class="card-title">02 / 入力明細ファイル</div>
    <div class="file-drop" id="file-drop">
      <input type="file" id="file-input" accept=".csv" multiple>
      <div class="file-drop-icon">📂</div>
      <div class="file-drop-text">
        CSVファイルをドロップ、または<em>クリックして選択</em><br>
        複数ファイル選択可
      </div>
    </div>
    <div class="file-list" id="file-list"></div>
  </div>

  <button class="btn-run" id="btn-run" onclick="runProcess()">
    出力ファイル作成
  </button>

  <!-- ステータス -->
  <div id="status-area" style="margin-top: 20px;">
    <!-- 処理中 -->
    <div id="processing-view" class="processing-box" style="display:none;">
      <div class="spinner"></div>
      <div class="processing-text">処理中…</div>
    </div>

    <!-- 完了 -->
    <div id="result-view" style="display:none;">
      <div id="skip-errors"></div>
      <div class="result-box">
        <div class="result-title">処理完了</div>
        <div class="result-section">
          <div class="result-section-label">入力ファイル</div>
          <div class="result-files" id="result-input-files"></div>
        </div>
        <div class="result-section">
          <div class="result-section-label">出力ファイル</div>
          <a id="result-output-link" class="result-link" href="#" target="_blank">
            <span>↗</span><span id="result-output-name"></span>
          </a>
        </div>
        <div class="result-section" id="result-count-section">
          <div class="result-section-label">出力レコード数</div>
          <div class="result-file" id="result-count"></div>
        </div>
      </div>
    </div>

    <!-- 致命的エラー -->
    <div id="fatal-view" class="fatal-box" style="display:none;">
      <div class="fatal-title">エラーが発生しました</div>
      <div class="fatal-message" id="fatal-message"></div>
    </div>
  </div>

  <!-- GAS URL設定 -->
  <div class="gas-url-section">
    <div class="card-title">設定 / GAS エンドポイント URL</div>
    <div class="gas-input-row">
      <input type="text" class="gas-input" id="gas-url-input"
        placeholder="https://script.google.com/macros/s/xxxxxxx/exec">
      <button class="btn-save" onclick="saveGasUrl()">保存</button>
    </div>
    <div class="saved-note" id="saved-note">✓ 保存しました</div>
  </div>

</div>

<script>
// =====================================================
// ファイル管理
// =====================================================
let selectedFiles = [];

const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const fileDrop = document.getElementById('file-drop');

fileInput.addEventListener('change', function() {
  addFiles(Array.from(this.files));
  this.value = '';
});

fileDrop.addEventListener('dragover', e => {
  e.preventDefault();
  fileDrop.classList.add('drag-over');
});
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  fileDrop.classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.csv'));
  addFiles(files);
});

function addFiles(files) {
  files.forEach(f => {
    if (!selectedFiles.find(s => s.name === f.name)) {
      selectedFiles.push(f);
    }
  });
  renderFileList();
}

function removeFile(idx) {
  selectedFiles.splice(idx, 1);
  renderFileList();
}

function renderFileList() {
  fileList.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <div class="file-item-name">${f.name}</div>
      <button class="file-item-remove" onclick="removeFile(${i})">×</button>
    `;
    fileList.appendChild(item);
  });
}

// =====================================================
// GAS URL 保存・読み込み
// =====================================================
const GAS_URL_KEY = 'poteri_gas_url';

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem(GAS_URL_KEY);
  if (saved) document.getElementById('gas-url-input').value = saved;
});

function saveGasUrl() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (url) {
    localStorage.setItem(GAS_URL_KEY, url);
    const note = document.getElementById('saved-note');
    note.style.display = 'block';
    setTimeout(() => note.style.display = 'none', 2000);
  }
}

function getGasUrl() {
  return localStorage.getItem(GAS_URL_KEY) || document.getElementById('gas-url-input').value.trim();
}

// =====================================================
// メイン処理
// =====================================================
async function runProcess() {
  const dateVal = document.getElementById('transfer-date').value;
  if (!dateVal) { alert('振込予定日を入力してください'); return; }
  if (selectedFiles.length === 0) { alert('入力明細CSVを選択してください'); return; }

  const gasUrl = getGasUrl();
  if (!gasUrl) { alert('GAS エンドポイント URL を設定してください'); return; }

  // UI: 処理中
  showStatus('processing');
  document.getElementById('btn-run').disabled = true;

  try {
    // CSV を全て読み込む
    const csvFiles = await Promise.all(
      selectedFiles.map(f => readFileAsText(f).then(content => ({
        filename: f.name,
        content: content
      })))
    );

    const payload = {
      action: 'createPayrollFile',
      transferDate: dateVal,
      csvFiles: csvFiles
    };

    const res = await fetch(gasUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'payload=' + encodeURIComponent(JSON.stringify(payload))
    });
    const data = await res.json();

    if (data.status === 'ok') {
      showResult(data);
    } else {
      showFatal(data.message || '不明なエラー');
    }
  } catch (err) {
    showFatal('通信エラー: ' + err.message);
  } finally {
    document.getElementById('btn-run').disabled = false;
  }
}

function readFileAsText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = () => reject(new Error('ファイル読み込み失敗: ' + file.name));
    reader.readAsText(file, 'UTF-8');
  });
}

// =====================================================
// 表示制御
// =====================================================
function showStatus(view) {
  document.getElementById('status-area').style.display = 'block';
  document.getElementById('processing-view').style.display = view === 'processing' ? 'flex' : 'none';
  document.getElementById('result-view').style.display = view === 'result' ? 'block' : 'none';
  document.getElementById('fatal-view').style.display = view === 'fatal' ? 'block' : 'none';
}

function showResult(data) {
  // スキップエラー（マスタ未ヒット）
  const skipErrors = document.getElementById('skip-errors');
  skipErrors.innerHTML = '';
  if (data.errors && data.errors.length > 0) {
    const box = document.createElement('div');
    box.className = 'error-box';
    box.innerHTML = `<div class="error-title">⚠ マスタ未ヒット — 以下のレコードはスキップされました</div>`;
    const ul = document.createElement('ul');
    ul.className = 'error-list';
    data.errors.forEach(e => {
      const li = document.createElement('li');
      li.textContent = `${e.filename}  ／  ${e.employeeName}`;
      ul.appendChild(li);
    });
    box.appendChild(ul);
    skipErrors.appendChild(box);
  }

  // 入力ファイル一覧
  const inputFilesEl = document.getElementById('result-input-files');
  inputFilesEl.innerHTML = '';
  (data.inputFileNames || []).forEach(name => {
    const el = document.createElement('div');
    el.className = 'result-file';
    el.textContent = name;
    inputFilesEl.appendChild(el);
  });

  // 出力ファイル
  document.getElementById('result-output-name').textContent = data.outputFileName;
  document.getElementById('result-output-link').href = data.outputFileUrl;

  // レコード数
  document.getElementById('result-count').textContent = data.recordCount + ' 件';

  showStatus('result');
}

function showFatal(message) {
  document.getElementById('fatal-message').textContent = message;
  showStatus('fatal');
}
</script>
</body>
</html>
